<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créateur de QR Code - SpeedyGeoTools</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/print.css" media="print">
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/easyqrcodejs@4.6.2/dist/easy.qrcode.min.js"></script>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="app-content">
        <div class="container no-print">
            <h1>Créateur de QR Code</h1>
            <p class="subtitle">Générez et imprimez vos QR codes géocaching personnalisés.</p>
            
            <div class="main-layout">
                <div class="controls-panel">
                    <div class="form-group">
                        <label for="qrUrl">Lien (URL) :</label>
                        <input type="url" id="qrUrl" placeholder="https://coord.info/GCxxxxx" required>
                    </div>
                    <div class="form-group">
                        <label for="qrTitle">Titre :</label>
                        <input type="text" id="qrTitle" placeholder="Ex: Cache Mystère">
                    </div>
                    <div class="form-group">
                        <label for="qrTitlePos">Position du Titre :</label>
                        <select id="qrTitlePos">
                            <option value="bottom">En dessous</option>
                            <option value="top">Au-dessus</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="qrLogo">Logo (optionnel) :</label>
                        <input type="file" id="qrLogo" accept="image/png, image/jpeg">
                    </div>
                    <div class="form-group">
                        <label for="qrColor">Couleur du QR Code :</label>
                        <input type="color" id="qrColor" value="#02874D">
                    </div>
                    <div class="form-group">
                        <label for="qrDesign">Design des points :</label>
                        <select id="qrDesign">
                            <option value="standard">Classique (Carrés)</option>
                            <option value="rounded">Arrondis</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="qrSize">Taille (en pixels) :</label>
                        <input type="number" id="qrSize" value="300" min="100" max="1000">
                    </div>
                    <div class="form-group">
                        <label for="qrQuantity">Nombre d'exemplaires :</label>
                        <input type="number" id="qrQuantity" value="10" min="1" max="100">
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button id="generateBtn">Générer</button>
                        <button id="printBtn" class="btn-secondary" style="display:none;">Imprimer PDF</button>
                    </div>
                </div>

                <div class="preview-panel" id="previewPanel" style="display:none; flex:1;">
                    <div class="widget-container" style="margin-top: 0; height: 100%;">
                        <h2>Prévisualisation</h2>
                        <div id="singlePreview" style="margin: auto; padding-top: 20px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="printContainer" class="print-only"></div>

        <footer class="site-footer no-print">
            <p>SpeedyGeoTools vous est utile ? <a href="https://paypal.me/JulienPorcher" target="_blank">Faire un don</a> ❤️</p>
            <a href="legal.html">Mentions Légales</a>
        </footer>
    </main>

    <script src="../js/main.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/qrcode.js"></script>
</body>
</html>
