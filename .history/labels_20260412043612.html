<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="SpeedyGeoTools - Label Creator">
    <meta property="og:description" content="Generate and print your custom geocaching labels with QR Codes and personalized options.">
    <meta property="og:image" content="https://speedygeotools.com/logo.png">
    <meta property="og:url" content="https://speedygeotools.com/labels.html">
    <meta property="og:type" content="website">
    <title>SpeedyGeoTools - Label Creator</title>
    <meta name="description" content="Generate and print your custom geocaching labels with QR Codes and personalized options.">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="alternate" hreflang="en" href="https://speedygeotools.com/labels.html" />
    <link rel="alternate" hreflang="fr" href="https://speedygeotools.com/fr/labels.html" />
    <link rel="alternate" hreflang="x-default" href="https://speedygeotools.com/labels.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/print.css">
    <link rel="canonical" href="https://speedygeotools.com/labels.html" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script>
        (function() {
            var supportedLangs = ['fr'];
            var userLang = (navigator.language || navigator.userLanguage).substring(0, 2).toLowerCase();
            if (!sessionStorage.getItem('lang_redirect') && supportedLangs.indexOf(userLang) !== -1) {
                sessionStorage.setItem('lang_redirect', 'true');
                window.location.replace(userLang + '/labels.html' + window.location.search);
            }
        })();
    </script>
</head>
<body>
    <div id="sidebar-placeholder"></div>
    <main class="app-content">
        <div class="container no-print">
            <h1>Label Creator</h1>
            <p class="subtitle">Configure your settings and click print.</p>
            <div class="main-layout" style="display:block;">
                <div class="controls-panel">
                    <div style="margin-bottom: 25px;">
                        <input type="file" id="importLabels" accept=".json" onchange="importConfig(event)" style="display: none;">
                        <button onclick="document.getElementById('importLabels').click()" class="btn-secondary">📁 Import configuration</button>
                    </div>
                    <div class="form-group">
                        <label for="labelSize">Label Size:</label>
                        <select id="labelSize" onchange="onSizeChange()">
                            <option value="micro">Micro (50x25mm)</option>
                            <option value="small" selected>Small (80x40mm)</option>
                            <option value="regular">Regular (120x60mm)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pdfLanguage">Text Language:</label>
                        <select id="pdfLanguage" onchange="onSizeChange()">
                            <option value="fr">Français</option>
                            <option value="en" selected>English (Anglais)</option>
                            <option value="de">Deutsch (Allemand)</option>
                            <option value="es">Español (Espagnol)</option>
                            <option value="it">Italiano (Italien)</option>
                            <option value="pt">Português (Portugais)</option>
                            <option value="nl">Nederlands (Néerlandais)</option>
                            <option value="cs">Čeština (Tchèque)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="labelOwner">Owner (Nickname):</label>
                        <input type="text" id="labelOwner" onkeyup="updateLabelPreview()">
                    </div>
                    <div class="form-group">
                        <label for="labelMail">Contact (Email / Phone):</label>
                        <input type="text" id="labelMail" onkeyup="updateLabelPreview()">
                    </div>
                    <div id="cachesListContainer"></div>
                    <button onclick="addCacheCard()" style="margin-bottom: 20px;">+ Add a cache</button>
                    <div id="labelPreviewContainer" style="margin-top: 20px; background: #e2e8f0; padding: 20px; border-radius: 8px;"></div>
                    <div style="margin-top: 30px; border-top: 1px solid var(--border-color); padding-top: 20px;">
                        <button onclick="exportConfig()" class="btn-secondary" style="margin-bottom: 15px;">💾 Export configuration</button>
                        <button onclick="generateLabelsAndPrint()">🖨️ Generate PDF / Print</button>
                    </div>
                </div>
            </div>
        </div>
        <footer class="site-footer no-print">
            <p>Find SpeedyGeoTools useful? <a href="https://paypal.me/JulienPorcher" target="_blank" rel="noopener noreferrer">Make a donation via PayPal</a> ❤️</p>
            <p class="disclaimer">
                SpeedyGeoTools is a third-party tool created by a player. The Geocaching logo is a registered trademark of Groundspeak, Inc. used with permission.<br>
                <a href="legal.html">Legal Notice & Privacy Policy</a>
            </p>
        </footer>
    </main>
    <div id="render-area"></div>
    <script src="js/i18n.js"></script>
    <script src="js/formats/micro.js"></script>
    <script src="js/formats/small.js"></script>
    <script src="js/formats/regular.js"></script>
    <script src="js/labels.js"></script>
    <script src="js/main.js"></script>
    <script src="js/sidebar.js"></script>
</body>
</html>
