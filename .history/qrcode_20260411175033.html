<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créateur de QR Code - SpeedyGeoTools</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/print.css" media="print">
    <link rel="icon" type="image/png" href="favicon.png">
    
    <script src="https://cdn.jsdelivr.net/npm/easyqrcodejs@4.6.2/dist/easy.qrcode.min.js"></script>
</head>
<body>
    <aside class="app-sidebar no-print">
        <div class="sidebar-header">
            <a href="index.html" class="sidebar-brand">
                <img src="logo.png" alt="SpeedyGeoTools Logo" class="brand-logo">
            </a>
            <button class="mobile-menu-toggle" id="mobileMenuBtn">☰</button>
        </div>
        
        <div class="sidebar-content" id="sidebarContent">
            <nav class="sidebar-nav">
                <a href="index.html" data-i18n="nav_home">Accueil</a>
                <a href="labels.html" data-i18n="nav_labels">Étiquettes</a>
                <a href="logbook.html" data-i18n="nav_logbook">Logbook</a>
                <a href="qrcode.html" class="active" data-i18n="nav_qrcode">QR Code</a>
            </nav>
        </div>
    </aside>

    <main class="app-content">
        <div class="container no-print">
            <h1 data-i18n="qrcode_title">Créateur de QR Code</h1>
            <p class="subtitle" data-i18n="qrcode_subtitle">Générez et imprimez vos QR codes géocaching personnalisés.</p>
            
            <div class="main-layout">
                <div class="controls-panel">
                    <div class="form-group">
                        <label for="qrUrl" data-i18n="qrcode_label_url">Lien (URL) :</label>
                        <input type="url" id="qrUrl" placeholder="https://coord.info/GCxxxxx" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="qrTitle" data-i18n="qrcode_label_title">Titre :</label>
                        <input type="text" id="qrTitle" placeholder="Ex: Cache Mystère">
                    </div>
                    
                    <div class="form-group">
                        <label for="qrTitlePos" data-i18n="qrcode_label_titlepos">Position du Titre :</label>
                        <select id="qrTitlePos">
                            <option value="bottom" data-i18n="qrcode_option_bottom">En dessous</option>
                            <option value="top" data-i18n="qrcode_option_top">Au-dessus</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="qrLogo" data-i18n="qrcode_label_logo">Logo (optionnel) :</label>
                        <input type="file" id="qrLogo" accept="image/png, image/jpeg">
                    </div>
                    
                    <div class="form-group">
                        <label for="qrColor" data-i18n="qrcode_label_color">Couleur du QR Code :</label>
                        <input type="color" id="qrColor" value="#02874D"> </div>
                    
                    <div class="form-group">
                        <label for="qrDesign" data-i18n="qrcode_label_design">Design des points :</label>
                        <select id="qrDesign">
                            <option value="standard" data-i18n="qrcode_option_standard">Classique (Carrés)</option>
                            <option value="rounded" data-i18n="qrcode_option_rounded">Arrondis</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="qrSize" data-i18n="qrcode_label_size">Taille (en pixels) :</label>
                        <input type="number" id="qrSize" value="300" min="100" max="1000">
                    </div>
                    
                    <div class="form-group">
                        <label for="qrQuantity" data-i18n="qrcode_label_quantity">Nombre d'exemplaires :</label>
                        <input type="number" id="qrQuantity" value="10" min="1" max="100">
                    </div>

                    <div style="display:flex; gap:10px;">
                        <button id="generateBtn" data-i18n="qrcode_btn_generate">Générer</button>
                        <button id="printBtn" class="btn-secondary" style="display:none;" data-i18n="qrcode_btn_print">Imprimer PDF</button>
                    </div>
                </div>

                <div class="preview-panel" id="previewPanel" style="display:none; flex:1;">
                    <div class="widget-container" style="margin-top: 0; height: 100%;">
                        <h2 data-i18n="qrcode_preview_header">Prévisualisation</h2>
                        <div id="singlePreview" style="margin: auto; padding-top: 20px;">
                            </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="printContainer" class="print-only">
        </div>

        <footer class="site-footer no-print">
            <p>&copy; 2026 SpeedyGeoTools.</p>
            <div class="disclaimer"><a href="legal.html" data-i18n="footer_legal">Mentions légales</a></div>
        </footer>
    </main>

    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
    <script src="js/qrcode.js"></script>
</body>
</html>
